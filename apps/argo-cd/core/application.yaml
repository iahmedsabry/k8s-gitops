apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default

  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: 5.51.6
    helm:
      values: |
        configs:
          params:
            server.insecure: true

        server:
          service:
            type: NodePort

          extraArgs:
            - --insecure

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  ignoreDifferences:
    - group: ""
      kind: Secret
      name: argocd-secret
      namespace: argocd
      jsonPointers:
        - /data

  syncPolicy:
    automated:
      prune: true
      selfHeal: true


    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Replace=true