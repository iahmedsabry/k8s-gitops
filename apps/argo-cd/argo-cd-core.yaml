apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-cd-core
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/iahmedsabry/k8s-gitops.git
    targetRevision: main
    path: apps/argo-cd/core

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true