apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-aws-lb-controller
  namespace: argocd
  
spec:
  project: default

  source:
    repoURL: https://github.com/iahmedsabry/k8s-gitops.git
    targetRevision: main
    path: apps/infra/aws-lb-controller

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true