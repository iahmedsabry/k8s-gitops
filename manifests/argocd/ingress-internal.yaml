apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-ingress-internal # Different name!
  namespace: argocd
  annotations:
    # This triggers the AWS Route 53 magic
    external-dns.alpha.kubernetes.io/hostname: argocd.insightlab.internal
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: nginx
  # Note: No TLS block here because we can't use Let's Encrypt for .internal
  rules:
    - host: argocd.insightlab.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80 # Matching your existing working port