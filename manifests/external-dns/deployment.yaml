apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns
  namespace: kube-system
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: external-dns
  template:
    metadata:
      labels:
        app: external-dns
    spec:
      serviceAccountName: external-dns
      containers:
      - name: external-dns
        image: registry.k8s.io/external-dns/external-dns:v0.13.5
        args:
        - --source=ingress
        - --domain-filter=insightlab.internal
        - --provider=aws
        - --policy=upsert-only
        - --aws-zone-type=private
        - --publish-internal-services
        - --connector-source=node
        - --registry=txt
        - --txt-owner-id=k8s-cluster